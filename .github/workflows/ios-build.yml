name: iOS Development Local Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: Chạy lệnh Build Local iOS Development
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # Truyền token trực tiếp vào bước chạy lệnh này
        run: eas build --profile development --platform ios --local --non-interactive

      - name: Upload file .ipa thành phẩm
        uses: actions/upload-artifact@v4
        with:
          name: ios-development-build
          path: "*.ipa"
          if-no-files-found: error
