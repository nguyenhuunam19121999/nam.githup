name: iOS Production Local Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # Tự động lấy hệ điều hành macOS mới nhất hỗ trợ Node 24
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Nâng cấp lên Node 24 đồng bộ với máy ảo GitHub

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # Dùng bản v4 mới nhất để xử lý mượt workspace
        with:
          version: 9 # Nâng cấp lên pnpm v9 để chạy mượt mà trên môi trường Node 24
          run_install: false # Tắt tự động cài đặt ngầm để tự chạy lệnh ở bước sau

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: Đăng nhập Expo
        run: eas login --token "${{ secrets.EXPO_TOKEN }}"

      - name: Chạy lệnh Build Local iOS
        run: eas build --profile production --platform ios --local --non-interactive
