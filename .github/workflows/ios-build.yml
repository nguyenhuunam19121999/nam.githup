name: iOS Build - Version Bisect
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "vc-5.1.1-scanner-5.1.1"   # bản hiện tại đang crash
            vc: "5.1.1"
            scanner: "5.1.1"
          - name: "vc-5.1.0-scanner-5.1.1"   # test riêng core vision-camera
            vc: "5.1.0"
            scanner: "5.1.1"
          - name: "vc-5.1.1-scanner-5.1.0"   # test riêng barcode-scanner
            vc: "5.1.1"
            scanner: "5.1.0"
          - name: "vc-5.1.0-scanner-5.1.0"   # cả hai đều lùi
            vc: "5.1.0"
            scanner: "5.1.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Pin version test cho lần build này
        run: |
          pnpm add react-native-vision-camera@${{ matrix.vc }} react-native-vision-camera-barcode-scanner@${{ matrix.scanner }} --save-exact

      - name: In ra version thật sự đã resolve (để đối chiếu log)
        run: pnpm list react-native-nitro-image react-native-nitro-modules react-native-vision-camera react-native-vision-camera-barcode-scanner --depth 0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS CLI
        run: pnpm add -g eas-cli

      - name: Chạy lệnh Build Local iOS Development
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --profile development --platform ios --local --non-interactive

      - name: Upload file .ipa thành phẩm
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ matrix.name }}
          path: "*.ipa"
          if-no-files-found: error