kind = "mobile"
previewPath = "/"
title = "Mirai.JP"
version = "1.0.0"
id = "artifacts/mirai-jp"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18203

[services.development]
run = "pnpm --filter @workspace/mirai-jp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mirai-jp", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mirai-jp", "run", "serve" ]

[services.env]
PORT = "18203"
BASE_PATH = "/"
